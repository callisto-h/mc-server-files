# Sets the message sent when the resource pack has been updated
resourcePackUpdatedMessage: '&8[EliteMobs] &cThe EliteMobs resource pack has updated!
  This means that the current resource pack will not fully work until you restart
  your server. You only need to restart once!'
# Sets the message header for content updates available
# $count - the number of updates available
contentUpdatesAvailable: '&e$count content update(s) available:'
# Sets the format for each content update entry
# $name - the name of the content
contentUpdateEntry: '&e- $name'
# Sets the message header for outdated dungeons on player login
dungeonsOutdatedMessage: '&cThe following dungeons are outdated:'
# Message telling admins to use /em setup to view and update content.
# Followed by a clickable /em setup command and content link.
versionUseSetupMessage: '&7Use '
# Hover text on outdated content entries with a download link.
versionClickDownloadHover: '&9Click to go to download link!'
# Suffix shown after an outdated content name when no download link is available.
versionNoDownloadLink: ' &7(no download link available)'
# Message telling admins where to download updates.
versionDownloadAtMessage: '&8[EliteMobs]&f You can download the update at '
# Message telling admins that updating is easy.
versionUpdateEasyMessage: '&2Updating is quick & easy! '
# Clickable 'Click here' label linking to the wiki.
versionClickHereLabel: '&9&nClick here'
# Message fragment about install info and support.
versionInstallInfoMessage: ' &2for info on how to install updates and '
# Clickable 'here' label linking to Discord support.
versionHereLabel: '&9&nhere'
# Message fragment about the support room.
versionSupportRoomMessage: ' &2for the support room.'
# Clickable message to auto-update all content.
versionAutoUpdateMessage: '&a[Click here to update all content automatically]'
# Hover text for the auto-update button.
versionAutoUpdateHover: '&eRuns /em updatecontent'
# Prefix for each outdated content entry in the list.
versionOutdatedEntryPrefix: '&c- '
# Hover text for the Nightbreak content link.
versionNightbreakHover: Click for Nightbreak link
# Hover text for the wiki link.
versionWikiHover: Click for wiki link
# Hover text for the Discord support link.
versionDiscordHover: Discord support link
# Sets the OP-only message prefix about download links for wormhole content.
# Followed by clickable /em setup and Discord links.
wormholeOpDownloadMessage: '&8[OP] &7This content is not installed. Use '
# Sets the OP-only message shown when a wormhole destination is not set up yet.
# $filename - the wormhole config filename
# $number - the wormhole entry number (1 or 2)
wormholeOpSetupMessage: '&8[EliteMobs - OP-only message] &fTo set up this portal,
  stand at the desired destination and run: &a/em place wormhole $filename $number'
# Sets the OP-only message recommending where to place the Adventurer's Guild wormhole.
wormholeAgSpawnRecommendation: '&8[EliteMobs - OP-only message] &fThe official recommendation
  is to place this at your server''s spawn so players can access the Adventurer''s
  Guild through this portal!'
# Sets the message sent when no Nightbreak token is registered for download all
downloadAllNoTokenMessage: '&c[EliteMobs] No Nightbreak token registered. Use /nightbreaklogin
  <token> first.'
# Sets the message sent when all available packages are already downloaded
downloadAllNothingMessage: '&a[EliteMobs] No new content to download! All available
  packages are already downloaded.'
# Sets the message sent when no accessible content is found
downloadAllNoAccessMessage: '&c[EliteMobs] No accessible content found. Link your
  Nightbreak account and ensure you have access.'
# Sets the message sent when downloadable packages are found
# $count - the number of packages
downloadAllFoundMessage: '&e[EliteMobs] Found $count packages to download. Starting...'
# Sets the message showing download progress
# $current - current package number
# $total - total packages
# $name - package name
downloadAllProgressMessage: '&7[EliteMobs] ($current/$total) Downloading: $name...'
# Sets the message sent when a package is downloaded with more remaining
# $name - package name
# $remaining - number remaining
downloadAllDownloadedMoreMessage: '&a[EliteMobs] Downloaded $name! &7Please hold on,
  $remaining more to go...'
# Sets the message sent when a package is downloaded (last one)
# $name - package name
downloadAllDownloadedMessage: '&a[EliteMobs] Downloaded $name!'
# Sets the message sent when a package download fails
# $name - package name
downloadAllFailedMessage: '&c[EliteMobs] Failed to download: $name'
# Sets the message sent when all downloads are complete
# $completed - number of successful downloads
# $failed - number of failed downloads
downloadAllCompleteMessage: '&a[EliteMobs] Download complete! Downloaded: $completed,
  Failed: $failed'
# Sets the message sent when reloading to apply downloads
downloadAllReloadingMessage: '&a[EliteMobs] Reloading to apply downloads...'
# Sets the message sent when a bulk download is already in progress
downloadAllAlreadyRunningMessage: '&c[EliteMobs] A bulk download is already in progress!
  Please wait for it to finish.'
# Sets the message listing which packages failed to download
# $names - comma-separated list of failed package names
downloadAllFailedListMessage: '&c[EliteMobs] Failed packages: $names'
# Clickable message to download all available content from the setup menu
downloadAllSetupClickMessage: '&a[Click to download all available content]'
# Hover text for the download all button in setup menu
downloadAllSetupClickHover: '&eRuns /em downloadall'
# Sets the message sent when no Nightbreak token is registered
updateNoTokenMessage: '&c[EliteMobs] No Nightbreak token registered. Use /nightbreaklogin
  <token> first.'
# Sets the message sent when all content is up to date
updateAllUpToDateMessage: '&a[EliteMobs] All content is up to date!'
# Sets the message sent when outdated packages are found
# $count - the number of outdated packages
updateFoundOutdatedMessage: '&e[EliteMobs] Found $count outdated packages. Starting
  updates...'
# Sets the message sent when updates are complete
# $completed - number of successful downloads
# $failed - number of failed downloads
updateCompleteMessage: '&a[EliteMobs] Update complete! Downloaded: $completed, Failed:
  $failed'
# Sets the message sent when reloading to apply updates
updateReloadingMessage: '&a[EliteMobs] Reloading to apply updates...'
# Sets the message showing download progress
# $current - current package number
# $total - total packages
# $name - package name
updateProgressMessage: '&7[EliteMobs] ($current/$total) Downloading: $name...'
# Sets the message sent when a package is downloaded with more remaining
# $name - package name
# $remaining - number remaining
updateDownloadedMoreMessage: '&a[EliteMobs] Downloaded $name! &7Please hold on, $remaining
  more to go...'
# Sets the message sent when a package is downloaded (last one)
# $name - package name
updateDownloadedMessage: '&a[EliteMobs] Downloaded $name!'
# Sets the message sent when a package download fails
# $name - package name
updateFailedMessage: '&c[EliteMobs] Failed to download: $name'
# Sets the message shown when a player is farming natural elites too quickly.
# $time is the placeholder for the time until reset.
farmingWarningMessage: '&c[EliteMobs] &7You''ve been farming natural elites too quickly!
  No drops or XP will be awarded. Spread out your farming area or wait for the timeout
  to reset. Time until reset: &e$time &7seconds.'
# Sets the message shown when a player's natural elite kill limit has been reset.
farmingResetMessage: '&a[EliteMobs] &7Your natural elite kill limit has been reset!'
# Sets the message shown when a player is temporarily capped from earning rewards.
# $time is the placeholder for the time until reset.
farmingCapMessage: '&c[EliteMobs] &7You''re temporarily capped from earning rewards
  from natural elites in this area. Time until reset: &e$time &7seconds.'
# Sets the message shown when a player selects need for a loot item.
# $player is the placeholder for the player's display name.
# $item is the placeholder for the item's display name.
lootNeedMessage: $player &chas selected need for $item!
# Sets the message shown when a player selects greed for a loot item.
# $player is the placeholder for the player's display name.
# $item is the placeholder for the item's display name.
lootGreedMessage: $player &2has selected greed for $item!
# Sets the message sent when a quest ID is invalid.
questInvalidIdMessage: '&c[EliteMobs] Invalid quest ID!'
# Sets the message shown when quest bypass is enabled.
questBypassOnMessage: Now bypassing quest permission requirements!
# Sets the message shown when quest bypass is disabled.
questBypassOffMessage: No longer bypassing quest permission requirements!
# Sets the message shown when a treasure chest file name is invalid.
invalidTreasureChestFilename: '&c[EliteMobs] Invalid Treasure Chest file name!'
# Sets the message showing the relative position to an anchor point.
# $filename is the placeholder for the dungeon name.
# $coordinates is the placeholder for the relative coordinates.
relativePositionMessage: '&8[EliteMobs] &fRelative position to anchor point of &2$filename&f
  is &2$coordinates'
# Display name for the cheat sword given by the get tier command.
cheatSwordDisplayName: CHEAT SWORD
