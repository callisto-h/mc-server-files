# Sets the message shown when content has been downloaded and a reload is triggered.
contentDownloadedReloadMessage: '&a[EliteMobs] Content downloaded! Reloading EliteMobs...'
# Sets the message shown when the player does not have access to content.
# $name is the placeholder for the content name.
contentNoAccessMessage: '&cYou don''t have access to: &f$name'
# Sets the message prompting the player on how to get access.
contentGetAccessMessage: '&eYou can get access through:'
# Sets the Nightbreak link prefix in access info.
# Followed by a clickable nightbreak.io/elitemobs link.
contentNightbreakLink: '&a• Nightbreak: '
# Sets the Patreon link prefix in access info.
# Followed by a clickable Patreon link.
contentPatreonLink: '&6• Patreon: '
# Sets the itch.io link prefix in access info.
# Followed by a clickable itch.io link.
contentItchLink: '&d• itch.io: '
# Sets the message telling the player how to link their account after purchasing.
contentLinkAccountMessage: '&7After purchasing, use &e/nightbreaklogin <token> &7to
  link your account.'
# Sets the message shown when an instanced dungeon is installed.
# $name is the placeholder for the dungeon filename.
instancedDungeonInstalledMessage: '&2Dungeon $name installed!'
# Sets the access message shown when an instanced dungeon is installed.
instancedDungeonAccessMessage: '&6Instanced dungeons must be accessed either through
  the &a/em &6menu or an NPC! NPCs for premade EliteMobs content can be found at the
  Adventurer''s Guild Hub map.'
# Sets the note reminding players that instanced dungeons create and remove worlds.
instancedDungeonInstallNote: Remember that instanced dungeons create a world when
  you join them and remove that world when you are done playing in them!
# Sets the message shown when an enchantment instanced dungeon is installed.
enchantmentDungeonInstalledMessage: '&8[EliteMobs] &2Enchantment instanced dungeon
  installed! This dungeon can only be accessed when attempting to enchant items and
  getting a challenge as a result!'
# Sets the text shown above death banners instructing players to punch to resurrect.
instancePunchToRez: '&2Punch to rez!'
# Sets the text shown below death banners indicating remaining lives.
# $amount is the placeholder for the number of lives remaining.
instanceLivesLeft: $amount lives left!
# Sets the separator line used in the skill migration notification.
skillMigrationSeparator: <g:#8B0000:#CC4400:#DAA520>▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</g>
# Sets the title of the skill migration notification.
skillMigrationTitle: <g:#7B2FBE:#A855F7>&lSKILL SYSTEM ACTIVATED</g>
# Sets the first line of the skill migration notification.
skillMigrationLine1: '&7EliteMobs now uses a new skill leveling system!'
# Sets the second line of the skill migration notification.
skillMigrationLine2: '&eYou now level individual skills by killing mobs:'
# Sets the third line of the skill migration notification.
skillMigrationLine3: '&7- Swords, Axes, Bows, Crossbows, Tridents, Hoes'
# Sets the fourth line of the skill migration notification.
skillMigrationLine4: '&7- Armor levels on every kill at 1/3 XP rate'
# Sets the fifth line of the skill migration notification.
skillMigrationLine5: '&cAll players start fresh with Level 1 in all skills.'
# Sets the sixth line of the skill migration notification.
# Followed by a clickable /em command, then the suffix.
skillMigrationLine6: '&7Type '
# Sets the text after the clickable /em command in the skill migration notification.
skillMigrationLine6Suffix: ' &7and click &5Skills &7to view your progress!'
# Sets the message shown when a dynamic dungeon is installed.
# $name is the placeholder for the dungeon filename.
dynamicDungeonInstalledMessage: '&2Dynamic dungeon $name installed!'
# Sets the message shown when Vorpal Strike comes off cooldown.
vorpalStrikeReadyMessage: §6Vorpal Strike §aready!
# Sets the action bar message shown when Soul Siphon stacks decay.
soulSiphonDecayMessage: §7Soul Siphon stacks decayed
# Sets the action bar message shown when Spectral Scythe is on cooldown.
# $time is the placeholder for the remaining cooldown in seconds.
spectralScytheCooldownMessage: '§cSpectral Scythe on cooldown: $times'
# Sets the title shown when a player levels up a skill.
skillLevelUpTitle: '&6&lLEVEL UP!'
# Sets the subtitle shown when a player levels up a skill.
# $skill is the placeholder for the skill display name.
# $level is the placeholder for the new level.
skillLevelUpSubtitle: '&e$skill &7→ &aLevel $level'
# Sets the server-wide broadcast message when a player levels up a skill.
# $player is the placeholder for the player name.
# $skill is the placeholder for the skill display name.
# $level is the placeholder for the new level.
skillLevelUpBroadcast: '&6$player &7reached &e$skill &7level &a$level&7!'
# Sets the message shown when a player gains no XP because the mob is too low level.
# $mobLevel is the placeholder for the mob's level.
# $skill is the placeholder for the skill name.
# $playerLevel is the placeholder for the player's combat level.
skillXpNoGainMessage: '&7[&eEliteMobs&7] &cNo XP gained &7- this mob (level &f$mobLevel&7)
  is too far below your &e$skill &7level (&f$playerLevel&7). Fight stronger mobs!'
# Sets the message shown when XP is capped because the mob is too high level.
# $mobLevel is the placeholder for the mob's level.
# $skill is the placeholder for the skill name.
# $playerLevel is the placeholder for the player's combat level.
# $xp is the placeholder for the capped level.
skillXpCappedMessage: '&7[&eEliteMobs&7] &6XP capped &7- this mob (level &f$mobLevel&7)
  is below your &e$skill &7level (&f$playerLevel&7). XP reduced to &f$xp&7.'
# Sets the action bar format shown when a skill activates.
# $skillName is the placeholder for the skill name.
skillActivationFormat: '&6&l$skillName!'
# Sets the action bar format shown when a stacking skill gains stacks.
# $skillName is the placeholder for the skill name.
# $current is the placeholder for the current stack count.
# $max is the placeholder for the maximum stack count.
skillStackFormat: '&6&l$skillName &7($current/$max stacks)'
# Title shown on screen when a player is hit by the Taze power.
# Leave empty for subtitle only.
tazeShockedTitle: ''
# Sets the subtitle shown when a player is tazed by an elite mob.
tazeShockedSubtitle: Shocked!
# Sets the action bar message shown when discipline stacks are broken.
legionsDisciplineBrokenMessage: '&7Discipline broken...'
# Sets the action bar message shown when the Avatar of Judgment buff expires.
avatarFadesMessage: '&7Avatar fades...'
# Sets the message shown when a player tries to manually install models.
modelsAutoInstallMessage: Models are installed automatically, you can't do this manually!
# Sets the message shown when a player tries to uninstall models via the menu.
modelsCannotUninstallMessage: Models can't currently be uninstalled via this menu!
  Delete the Models folder in EliteMobs if you want to remove them.
# Sets the message shown when items are being installed.
# $count is the placeholder for the number of items.
itemsInstallingMessage: '&2Installing $count items...'
# Sets the message shown when items are being uninstalled.
# $count is the placeholder for the number of items.
itemsUninstallingMessage: '&2Uninstalling $count items...'
# Sets the message shown when item files are being saved.
# $count is the placeholder for the number of items.
itemsSavingMessage: '&2Saving $count item files...'
# Sets the message shown when EliteMobs is reloading to apply item changes.
itemsReloadingMessage: Reloading EliteMobs to apply item changes!
# Sets the message shown when events are being installed.
# $count is the placeholder for the number of events.
eventsInstallingMessage: '&2Installing $count events...'
# Sets the message shown when events are being uninstalled.
# $count is the placeholder for the number of events.
eventsUninstallingMessage: '&2Uninstalling $count events...'
# Sets the message shown when event files are being saved.
# $count is the placeholder for the number of events.
eventsSavingMessage: '&2Saving $count event files...'
# Sets the message shown when EliteMobs is reloading to apply event changes.
eventsReloadingMessage: Reloading EliteMobs to apply event changes!
