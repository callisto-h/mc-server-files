# Sets the text for joining a dungeon as a player! Placeholders:
# $dungeonName - the name of the dungeon
joinDungeonAsPlayerText: '&fJoin $dungeonName as a player!'
# Sets the text for joining a dungeon as a spectator! Placeholders:
# $dungeonName - the name of the dungeon
joinDungeonAsSpectatorText: '&fJoin $dungeonName as a spectator!'
# Sets the title that will show up in the item description of instanced dungeon menus
# $difficulty is the placeholder for the difficulty name in the configuration file of the dungeon
instancedDungeonTitle: Start $difficulty difficulty dungeon!
# Sets the description that will show up in the item description of instanced dungeon menus
# $dungeonName is the placeholder for the dungeon name in the configuration file of the dungeon
instancedDungeonDescription:
- '&fCreate a new instance of the dungeon'
- $dungeonName &ffor yourself and maybe
- '&fsome friends!'
# Sets is spectating instanced content will be available.
allowSpectatorsInInstancedContent: true
# Sets the message that appears when an instanced dungeon is completed
instancedDungeonCompleteMessage: '[EliteMobs] Dungeon completed! It will self-destruct
  in 2 minutes!'
# Sets the message that appears when an instanced dungeon closing
instancedDungeonClosingInstanceMessage: '[EliteMobs] Closing instance!'
# Sets if PvP will be allowed in dungeons
friendlyFireInDungeons: false
# Sets the damage multiplier for fire damage in dungeons
# This is important for balance as by default the damage is a bit too high for the dungeons as we design them
fireDamageMultiplier: 0.5
# Sets the damage multiplier for wither damage in dungeons
# This is important for balance as by default the damage is a bit too high for the dungeons as we design them
witherDamageMultiplier: 0.5
# Sets the damage multiplier for fire damage in dungeons
# This is important for balance as by default the damage is a bit too high for the dungeons as we design them
poisonDamageMultiplier: 0.5
# Sets the title for the dynamic dungeon level selection menu
dynamicDungeonLevelSelectionMenuTitle: '&8Select Dungeon Level'
# Sets the title for level selection items in the dynamic dungeon menu
# $level is the placeholder for the level number
dynamicDungeonLevelSelectionItemTitle: '&fLevel $level'
# Sets the 'click to select' text in the dynamic dungeon level selection menu
# $level is the placeholder for the level number
dynamicDungeonLevelSelectionClickToSelect: '&7Click to select level &e$level'
# Sets the 'mobs will be level' text in the dynamic dungeon level selection menu
# $level is the placeholder for the level number
dynamicDungeonLevelSelectionMobsWillBeLevel: '&7All mobs will be level &e$level'
# Sets the 'recommended level' text in the dynamic dungeon level selection menu
dynamicDungeonLevelSelectionRecommended: '&a&lRecommended level!'
# Sets the 'easier than recommended' text in the dynamic dungeon level selection menu
dynamicDungeonLevelSelectionEasier: '&eEasier than recommended'
# Sets the 'harder than recommended' text in the dynamic dungeon level selection menu
dynamicDungeonLevelSelectionHarder: '&6Harder than recommended'
# Sets the title for the dynamic dungeon difficulty selection menu
dynamicDungeonDifficultySelectionMenuTitle: '&8Select Difficulty'
# Sets the 'selected level' text in the dynamic dungeon difficulty selection menu
# $level is the placeholder for the selected level number
dynamicDungeonDifficultySelectionSelectedLevel: '&7Selected Level: &e$level'
# Title shown on screen during dungeon boss lockout.
# Leave empty for subtitle only.
dungeonLockoutTitle: ''
# Sets the subtitle shown when a player kills a boss they are locked out from
dungeonLockoutSubtitle: '&cLockout!'
# Sets the chat message shown when a player kills a boss they are locked out from
# $bossName is the placeholder for the boss name
# $remainingTime is the placeholder for the remaining lockout time
dungeonLockoutChatMessage: '&c[EliteMobs] &7You killed &c$bossName &7in the last lockout
  period and must wait another &e$remainingTime &7before it will drop loot for you
  again.'
# Sets the message sent when a player tries to open a browser for an invalid instanced dungeon
invalidInstancedDungeonMessage: '[EliteMobs] Not a valid instanced dungeon!'
# Sets the message sent when a player tries to open a browser for an invalid dynamic dungeon
invalidDynamicDungeonMessage: '[EliteMobs] Not a valid dynamic dungeon!'
# Sets the message sent when a player tries to join a match that has already ended
matchAlreadyEndedMessage: '[EliteMobs] This match already ended! Can''t join it!'
# Sets the players label shown in dungeon browser lore
dungeonBrowserPlayersLabel: '&2Players:'
# Sets the format for each player entry in dungeon browser lore
# $playerName is the placeholder for the player's display name
dungeonBrowserPlayerEntryFormat: '&f- $playerName'
# Sets the level label shown in dungeon browser lore
# $level is the placeholder for the dungeon level
dungeonBrowserLevelLabel: '&7Level: &e$level'
# Sets the message shown when a player's dungeon preparation is queued
# $position is the placeholder for the queue position
dungeonPreparingQueueMessage: '[EliteMobs] Preparing your dungeon... (Queue position:
  $position)'
# Sets the message shown when a player's dungeon is being prepared
dungeonPreparingMessage: '[EliteMobs] Preparing your dungeon...'
# Sets the message shown when dungeon preparation fails during the async phase
dungeonPrepareFailedMessage: '[EliteMobs] Failed to prepare dungeon. Please try again.'
# Sets the message shown when dungeon loading fails during the sync phase
dungeonLoadFailedMessage: '[EliteMobs] Failed to load dungeon. Please try again.'
# Sets the message shown when dungeon preparation is cancelled due to server shutdown
dungeonCancelledShutdownMessage: '[EliteMobs] Dungeon preparation cancelled due to
  server shutdown.'
# Sets the message shown when dungeon data cannot be found
# $dungeon is the placeholder for the dungeon config name
dungeonDataFailedMessage: '[EliteMobs] Failed to get data for dungeon $dungeon! The
  dungeon will not start.'
# Sets the message shown when a player doesn't have permission for a dungeon
dungeonNoPermissionMessage: '[EliteMobs] You don''t have the permission to go to this
  dungeon!'
# Sets the message shown when the instancing event is cancelled
dungeonCancelledEventMessage: '[EliteMobs] Something cancelled the instancing event!
  The dungeon will not start.'
# Sets the message shown when world copy fails
dungeonCopyFailedMessage: '[EliteMobs] Failed to copy the world! Report this to the
  dev. The dungeon will not start.'
# Sets the message shown when world loading fails
dungeonWorldLoadFailedMessage: '[EliteMobs] Failed to load the world! Report this
  to the dev. The dungeon will not start.'
# Sets the message shown when a player joins a dungeon with level sync
# $difficulty is the placeholder for the difficulty name
# $levelSync is the placeholder for the level sync cap
dungeonDifficultyMessage: '[EliteMobs] Dungeon difficulty is set to $difficulty! Level
  sync caps your item level to $levelSync.'
# Sets the message shown when dynamic dungeon data cannot be found
# $dungeon is the placeholder for the dungeon config name
dynamicDungeonDataFailedMessage: '[EliteMobs] Failed to get data for dynamic dungeon
  $dungeon! The dungeon will not start.'
# Sets the message shown when a player doesn't have permission for a dynamic dungeon
dynamicDungeonNoPermissionMessage: '[EliteMobs] You don''t have the permission to
  go to this dungeon!'
# Sets the message shown when world loading fails for a dynamic dungeon
dynamicDungeonWorldLoadFailedMessage: '[EliteMobs] Failed to load the world! Report
  this to the dev. The dungeon will not start.'
# Sets the message shown when a player joins a dynamic dungeon
# $level is the placeholder for the selected level
dynamicDungeonLevelSetMessage: '[EliteMobs] Dynamic dungeon level set to $level!'
# Sets the message shown when no challenge dungeons are installed
enchantNoChallengeMessage: '&8[EliteMobs] &cYou rolled challenge but your server has
  not installed any challenge dungeons! &2This will count as an automatic enchantment
  success.'
# Sets the message shown when an enchantment challenge is completed
enchantChallengeCompleteMessage: '&8[EliteMobs] &2Challenge complete! Instance will
  close in 10 seconds. &6You can leave earlier by doing &9/em quit&6!'
# Sets the message shown when an enchantment challenge succeeds
enchantChallengeSuccessMessage: '&8[EliteMobs] &2You succeeded your item enchantment
  challenge! Your item has been successfully enchanted.'
# Sets the message shown on critical enchantment failure
# $item is the placeholder for the item display name
enchantCriticalFailureMessage: '&8[EliteMobs] &4Critical enchantment failure! You
  have lost $item!'
# Sets the message shown when an enchantment challenge fails
# $item is the placeholder for the item display name
enchantChallengeFailedMessage: '&8[EliteMobs] &cYou have failed the enchantment challenge!
  Your item $item was not enchanted.'
# Sets the message shown when content is successfully installed
# $name is the placeholder for the content name
contentInstalledMessage: '[EliteMobs] Successfully installed $name! To uninstall,
  do /em setup again and click on this content again.'
# Sets the message shown when content uninstall fails
# $name is the placeholder for the content name
contentUninstallFailedMessage: '&c[EliteMobs] Failed to uninstall $name! There may
  still be players in the world.'
# Sets the message shown when content is successfully uninstalled
# $name is the placeholder for the content name
contentUninstalledMessage: '&a[EliteMobs] Successfully uninstalled $name!'
# Sets the first access message shown when a dynamic dungeon is installed
dynamicDungeonAccessMessage1: '&6Dynamic dungeons must be accessed either through
  the &a/em &6menu or an NPC! NPCs for premade EliteMobs content can be found at the
  Adventurer''s Guild Hub map.'
# Sets the second access message shown when a dynamic dungeon is installed
dynamicDungeonAccessMessage2: Dynamic dungeons allow you to select the level before
  entering based on your guild rank!
# Sets the third access message shown when a dynamic dungeon is installed
dynamicDungeonAccessMessage3: Remember that instanced dungeons create a world when
  you join them and remove that world when you are done playing in them!
# Sets the first line of the tooltip for installed content in the setup menu.
contentInstalledLine1: Content is installed!
# Sets the second line of the tooltip for installed content in the setup menu.
contentInstalledLine2: Click to uninstall!
# Sets the first line of the tooltip for content that is downloaded but not installed.
contentNotInstalledLine1: Content is not installed!
# Sets the second line of the tooltip for content that is downloaded but not installed.
contentNotInstalledLine2: Click to install!
# Sets the first line of the tooltip for partially installed content.
contentPartialLine1: Content partially installed!
# Sets the second line of the tooltip for partially installed content.
contentPartialLine2: This is either because you haven't downloaded all of it,
# Sets the third line of the tooltip for partially installed content.
contentPartialLine3: or because some elements have been manually disabled.
# Sets the fourth line of the tooltip for partially installed content.
contentPartialLine4: Click to download!
# Sets the first line of the tooltip for content that has not been downloaded.
contentNotDownloadedLine1: Content is not downloaded!
# Sets the second line of the tooltip for content that has not been downloaded.
contentNotDownloadedLine2: Click to download!
# Sets the tooltip message shown when access is required to download content.
contentNeedAccessMessage: '&cYou need access to download this content!'
# Sets the tooltip message prompting the user to click for access info.
contentAccessClickMessage: '&eClick to see how to get access.'
# Sets the tooltip message indicating content is available via Patreon.
contentAvailablePatreon: '&7Available via: &6Patreon'
# Sets the tooltip message indicating content is available via itch.io.
contentAvailableItch: '&7Available via: &ditch.io'
# Sets the tooltip message indicating an update is available.
contentUpdateAvailable: '&eUpdate available!'
# Sets the tooltip message prompting the user to click to update.
contentUpdateClickMessage: '&aClick to update automatically!'
# Sets the tooltip message indicating access is required for the update.
contentUpdateNeedAccess: '&cYou need access to download this update.'
# Sets the tooltip message prompting the user to click for access info for updates.
contentUpdateAccessClick: '&7Click to see how to get access.'
# Sets the legacy download message shown when no Nightbreak slug is configured.
# $link is the placeholder for the download link.
contentDownloadLegacyMessage: '&4Download this at &9$link &4!'
