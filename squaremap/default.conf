server {
    listen 80;

    location / {
        proxy_pass http://paper:8080;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;

        # Disable caching so player positions update in real time
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }
}
